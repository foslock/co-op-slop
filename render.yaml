services:
  - type: web
    name: only-us
    runtime: node
    branch: main
    plan: starter
    # --include=dev is required: Render sets NODE_ENV=production, which makes a
    # plain `npm ci` skip devDependencies — and the build tools (vite, esbuild,
    # typescript) live there.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      # Set the value in the Render dashboard (e.g. the internal connection
      # string of an existing Postgres instance). `fromDatabase` only works for
      # databases declared in this same blueprint file.
      - key: DATABASE_URL
        sync: false
